
<!DOCTYPE html>
<meta charset="UTF-8">
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四仙便民通 - 互联网 + 乡村治理</title>
    <style>
        :root {
            --primary-red: #B22222; /* 火砖红，沉稳 */
            --primary-dark: #8B0000;
            --bg-color: #F9F7F2; /* 米白宣纸色 */
            --card-bg: #FFFFFF;
            --text-main: #2C2C2C;
            --text-secondary: #666666;
            --border-color: #DCCFC2;
            --shadow: 0 4px 12px rgba(178, 34, 34, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Songti SC", "SimSun", "STSong", "AR PL New Sung", serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 头部导航 */
        header {
            background-color: var(--primary-red);
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid white;
            padding: 5px 15px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav li {
            cursor: pointer;
            font-size: 1.1rem;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        nav li:hover, nav li.active {
            border-bottom-color: white;
            color: #FFE4E1;
        }

        /* 主体容器 */
        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            min-height: 80vh;
        }

        section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: var(--primary-red);
            margin-bottom: 40px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background-color: var(--primary-red);
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: var(--primary-red);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary-red);
        }

        /* 模块一：一键上报 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background: #FAFAFA;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
        }

        .form-input[readonly] {
            color: var(--text-secondary);
            background: #F0F0F0;
        }

        .upload-box {
            border: 2px dashed var(--border-color);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: border-color 0.3s;
        }

        .upload-box:hover {
            border-color: var(--primary-red);
            color: var(--primary-red);
        }

        .btn {
            background-color: var(--primary-red);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.3s;
            display: block;
            margin: 30px auto 0;
        }

        .btn:hover {
            background-color: var(--primary-dark);
        }

        /* 模块二 & 三：列表样式 */
        .list-item {
            cursor: pointer;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .list-date {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: normal;
        }

        .list-summary {
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .list-meta {
            font-size: 0.85rem;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .tag {
            background: #FFF0F0;
            color: var(--primary-red);
            padding: 2px 8px;
            border-radius: 2px;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            border-top: 5px solid var(--primary-red);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--primary-red);
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--primary-red);
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .modal-body {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #333;
        }

        .modal-date {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: right;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }
            nav ul {
                gap: 15px;
                font-size: 0.9rem;
            }
            .card {
                padding: 15px;
            }
            .modal-content {
                padding: 20px;
                width: 95%;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="logo">四仙便民通</div>
        <nav>
            <ul>
                <li class="nav-item active" data-target="section-report">一键上报</li>
                <li class="nav-item" data-target="section-log">民情日志</li>
                <li class="nav-item" data-target="section-policy">政策速递</li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <!-- 模块一：一键上报 -->
    <section id="section-report" class="active">
        <h2 class="section-title">网格问题上报</h2>
        <div class="card">
            <form id="report-form">
                <div class="form-group">
                    <label class="form-label">上报时间</label>
                    <input type="text" class="form-input" id="report-time" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">地理位置</label>
                    <input type="text" class="form-input" id="report-location" readonly value="四仙村·党群服务中心">
                </div>
                <div class="form-group">
                    <label class="form-label">问题类别</label>
                    <select class="form-input" id="report-category">
                        <option value="environment">环境卫生</option>
                        <option value="facility">公共设施</option>
                        <option value="security">治安隐患</option>
                        <option value="other">其他事项</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">问题描述</label>
                    <textarea class="form-input" rows="5" placeholder="请详细描述现场情况..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">现场照片</label>
                    <div class="upload-box" id="upload-trigger">
                        <img src="https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png" alt="placeholder" style="width: 40px; opacity: 0.5; margin-bottom: 10px;">
                        <div>点击上传现场照片</div>
                    </div>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                    <div id="file-name" style="margin-top: 10px; font-size: 0.9rem; color: var(--primary-red);"></div>
                </div>
                <button type="submit" class="btn">提交上报</button>
            </form>
        </div>
    </section>

    <!-- 模块二：民情日志 -->
    <section id="section-log">
        <h2 class="section-title">民情日志档案</h2>
        <div id="log-list-container">
            <!-- 动态生成 -->
        </div>
    </section>

    <!-- 模块三：政策速递 -->
    <section id="section-policy">
        <h2 class="section-title">惠民政策速递</h2>
        <div id="policy-list-container">
            <!-- 动态生成 -->
        </div>
    </section>
</main>

<footer>
    <p>? 2026 四仙村村民委员会 版权所有</p>
    <p>探索“互联网 + 乡村治理”微创新模式</p>
</footer>

<!-- 详情模态框 -->
<div class="modal" id="detail-modal">
    <div class="modal-content">
        <span class="modal-close" id="modal-close">&times;</span>
        <h3 class="modal-title" id="modal-title">标题</h3>
        <div class="modal-date" id="modal-date">日期</div>
        <div class="modal-body" id="modal-body">内容</div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 数据准备 (所有时间均在 2026 年 2 月之前)
        const logsData = [
            {
                id: 1,
                title: '关于村西头路灯维修的走访记录',
                date: '2026-01-28',
                visitor: '网格员 李建国',
                villager: '村民 王大爷',
                content: '今日走访王大爷家，反映村西头主干道第 3 号路灯损坏，夜间出行不便。已现场拍照记录，并联系电力维修部门，预计明日修复。村民对响应速度表示满意。',
                status: '已解决'
            },
            {
                id: 2,
                title: '春节前夕困难家庭慰问记录',
                date: '2026-01-20',
                visitor: '村支书 张爱民',
                villager: '低保户 刘某某',
                content: '携米面油慰问品走访刘某某家，询问冬季取暖情况及身体状况。协助检查了家中电路安全，叮嘱注意用火用电。记录其希望申请临时救助的诉求，已带回村委会研究。',
                status: '跟进中'
            },
            {
                id: 3,
                title: '村民土地流转意愿调查',
                date: '2025-12-15',
                visitor: '网格员 赵敏',
                villager: '村民小组 第三组',
                content: '针对 upcoming 的农业合作社项目，走访第三组村民，收集土地流转意愿。大部分村民支持统一规划，少数村民对补偿标准有疑虑，已记录并在后续会议中讨论。',
                status: '已归档'
            },
            {
                id: 4,
                title: '邻里纠纷调解记录',
                date: '2025-11-10',
                visitor: '调解员 陈和平',
                villager: '村民 周某 & 吴某',
                content: '周某与吴某因宅基地界限问题发生争执。现场测量界限，查阅历史档案，经过 3 小时调解，双方达成和解协议，重新立界桩。',
                status: '已解决'
            }
        ];

        const policiesData = [
            {
                id: 1,
                title: '2026 年四仙村农业种植补贴实施方案',
                date: '2026-01-10',
                summary: '本年度水稻、小麦种植补贴标准及申报流程详解...',
                content: '<p>各位村民：</p><p>为贯彻落实国家惠农政策，结合我村实际情况，现将 2026 年农业种植补贴实施方案公布如下：</p><p><strong>一、补贴对象</strong><br>拥有土地承包经营权并实际种植粮食作物的农户。</p><p><strong>二、补贴标准</strong><br>1. 水稻：每亩 120 元<br>2. 小麦：每亩 100 元<br>3. 玉米：每亩 90 元</p><p><strong>三、申报时间</strong><br>2026 年 1 月 15 日至 2026 年 2 月 28 日。</p><p>请广大村民相互转告，按时申报。</p><p style="text-align:right">四仙村村民委员会<br>2026 年 1 月 10 日</p>'
            },
            {
                id: 2,
                title: '关于做好 2026 年春节期间安全生产工作的通知',
                date: '2026-01-05',
                summary: '加强烟花爆竹管理，注意用火用电安全...',
                content: '<p>各位村民：</p><p>2026 年春节将至，为确保全村人民度过一个祥和、安全的节日，现将有关事项通知如下：</p><p><strong>一、烟花爆竹管理</strong><br>请在指定区域燃放，严禁在草堆、树林附近燃放。</p><p><strong>二、用火用电安全</strong><br>外出前请关闭电源火源，独居老人请邻居多加照看。</p><p><strong>三、交通安全</strong><br>饮酒不开车，开车不饮酒。</p><p>祝大家新春快乐，阖家幸福！</p><p style="text-align:right">四仙村安全办公室<br>2026 年 1 月 5 日</p>'
            },
            {
                id: 3,
                title: '2025 年度新型农村合作医疗报销指南',
                date: '2025-12-20',
                summary: '最新报销比例及异地就医备案流程...',
                content: '<p>各位村民：</p><p>2025 年度新农合报销工作已全面展开，为方便村民就医报销，特整理指南如下：</p><p><strong>1. 村内卫生室</strong><br>直接刷卡结算，报销比例 85%。</p><p><strong>2. 县外就医</strong><br>需提前办理异地备案手续，可通过本村便民服务中心代办。</p><p><strong>3. 大病保险</strong><br>年度自付超过 1 万元部分，启动大病保险二次报销。</p><p>如有疑问，请咨询村医保专员。</p><p style="text-align:right">四仙村医保办<br>2025 年 12 月 20 日</p>'
            },
            {
                id: 4,
                title: '四仙村人居环境整治提升行动方案',
                date: '2025-11-01',
                summary: '共建美丽家园，开展庭院卫生评比活动...',
                content: '<p>各位村民：</p><p>为改善我村人居环境，提升生活品质，决定开展“美丽庭院”评比活动。</p><p><strong>评比标准：</strong><br>房前屋后无杂物，垃圾分类入桶，庭院绿化美观。</p><p><strong>奖励措施：</strong><br>每季度评选 10 户“美丽庭院”，给予洗衣液、大米等物质奖励。</p><p>让我们携手行动，共建美好四仙。</p><p style="text-align:right">四仙村村民委员会<br>2025 年 11 月 1 日</p>'
            }
        ];

        // 1. 初始化上报表单时间 (模拟 2026 年 1 月某日)
        const reportTimeInput = document.getElementById('report-time');
        const simulatedTime = new Date(2026, 0, 25, 10, 30); // 2026-01-25
        const timeString = simulatedTime.getFullYear() + '年' + 
                           (simulatedTime.getMonth() + 1) + '月' + 
                           simulatedTime.getDate() + '日 ' + 
                           simulatedTime.getHours() + ':' + 
                           (simulatedTime.getMinutes() < 10 ? '0' : '') + simulatedTime.getMinutes();
        reportTimeInput.value = timeString;

        // 2. 渲染列表函数
        function renderLogs() {
            const container = document.getElementById('log-list-container');
            logsData.forEach(log => {
                const card = document.createElement('div');
                card.className = 'card list-item';
                card.dataset.id = log.id;
                card.dataset.type = 'log';
                card.innerHTML = `
                    <div class="list-header">
                        <span>${log.title}</span>
                        <span class="list-date">${log.date}</span>
                    </div>
                    <div class="list-summary">${log.content}</div>
                    <div class="list-meta">
                        <span>走访人：${log.visitor}</span>
                        <span class="tag">${log.status}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderPolicies() {
            const container = document.getElementById('policy-list-container');
            policiesData.forEach(policy => {
                const card = document.createElement('div');
                card.className = 'card list-item';
                card.dataset.id = policy.id;
                card.dataset.type = 'policy';
                card.innerHTML = `
                    <div class="list-header">
                        <span>${policy.title}</span>
                        <span class="list-date">${policy.date}</span>
                    </div>
                    <div class="list-summary">${policy.summary}</div>
                    <div class="list-meta">
                        <span>发布单位：四仙村村民委员会</span>
                        <span style="color:var(--primary-red)">点击查看详情 &gt;</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 3. 导航切换逻辑
        const navItems = document.querySelectorAll('.nav-item');
        const sections = document.querySelectorAll('section');

        navItems.forEach(item => {
            item.addEventListener('click', function() {
                // 移除 active
                navItems.forEach(nav => nav.classList.remove('active'));
                sections.forEach(sec => sec.classList.remove('active'));
                
                // 添加 active
                this.classList.add('active');
                const targetId = this.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
                
                // 滚动到顶部
                window.scrollTo(0, 0);
            });
        });

        // 4. 文件上传模拟
        const uploadTrigger = document.getElementById('upload-trigger');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');

        uploadTrigger.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                fileNameDisplay.textContent = '已选择：' + e.target.files[0].name;
                uploadTrigger.style.borderColor = 'var(--primary-red)';
                uploadTrigger.style.color = 'var(--primary-red)';
            }
        });

        // 5. 表单提交
        const reportForm = document.getElementById('report-form');
        reportForm.addEventListener('submit', function(e) {
            e.preventDefault();
            alert('上报成功！\n系统已自动记录时间与地点。\n网格员将尽快处理。');
            reportForm.reset();
            reportTimeInput.value = timeString; // 重置时间
            reportLocationInput = document.getElementById('report-location');
            reportLocationInput.value = "四仙村·党群服务中心";
            fileNameDisplay.textContent = '';
            uploadTrigger.style.borderColor = 'var(--border-color)';
            uploadTrigger.style.color = 'var(--text-secondary)';
        });

        // 6. 模态框逻辑
        const modal = document.getElementById('detail-modal');
        const modalClose = document.getElementById('modal-close');
        const modalTitle = document.getElementById('modal-title');
        const modalDate = document.getElementById('modal-date');
        const modalBody = document.getElementById('modal-body');

        // 委托事件监听列表点击
        const logContainer = document.getElementById('log-list-container');
        const policyContainer = document.getElementById('policy-list-container');

        function openModal(data, type) {
            modalTitle.textContent = data.title;
            modalDate.textContent = '日期：' + data.date;
            if (type === 'log') {
                modalBody.innerHTML = `
                    <p><strong>走访人员：</strong>${data.visitor}</p>
                    <p><strong>走访对象：</strong>${data.villager}</p>
                    <p><strong>状态：</strong>${data.status}</p>
                    <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                    <p>${data.content}</p>
                `;
            } else {
                modalBody.innerHTML = data.content;
            }
            modal.classList.add('active');
        }

        logContainer.addEventListener('click', function(e) {
            const card = e.target.closest('.list-item');
            if (card) {
                const id = parseInt(card.dataset.id);
                const data = logsData.find(item => item.id === id);
                if (data) openModal(data, 'log');
            }
        });

        policyContainer.addEventListener('click', function(e) {
            const card = e.target.closest('.list-item');
            if (card) {
                const id = parseInt(card.dataset.id);
                const data = policiesData.find(item => item.id === id);
                if (data) openModal(data, 'policy');
            }
        });

        modalClose.addEventListener('click', function() {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // 初始化渲染
        renderLogs();
        renderPolicies();
    });
</script>

</body>

</html>
